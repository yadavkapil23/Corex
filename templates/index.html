<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#3b82f6" />
  <title>NeoBot | AI Assistant</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="chat-container">
    <!-- Header -->
    <header class="chat-header">
      <div class="header-left">
        <h1>NeoBot</h1>
        <div class="header-dropdown">
          <i class="fas fa-chevron-down"></i>
        </div>
      </div>
      <div class="header-right">
        <button class="header-btn" title="Share">
          <i class="fas fa-share"></i>
        </button>
        <button class="header-btn" title="More options">
          <i class="fas fa-ellipsis-h"></i>
        </button>
      </div>
    </header>

    <!-- Chat Messages -->
    <main class="chat-messages" id="chatMessages">
      <div class="welcome-message">
        <h2>Welcome to NeoBot!</h2>
        <p>Ask me anything and I'll help you with accurate, document-backed answers.</p>
      </div>
    </main>

    <!-- Input Area -->
    <div class="chat-input-container">
      <div class="chat-input-wrapper">
        <button class="input-btn" title="Attach file">
          <i class="fas fa-plus"></i>
        </button>
        <input
          type="text"
          id="queryInput"
          placeholder="Ask anything"
          autocomplete="off"
          class="chat-input"
        />
        <button class="input-btn" title="Voice input">
          <i class="fas fa-microphone"></i>
        </button>
        <button id="askButton" class="send-btn" title="Send message">
          <i class="fas fa-paper-plane"></i>
        </button>
      </div>
      <div class="scroll-indicator">
        <i class="fas fa-chevron-down"></i>
      </div>
    </div>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
