<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#C04A2B" />
  <title>Corex | AI Assistant</title>

  <link rel="manifest" href="/static/manifest.json" />
  <link rel="icon" href="/static/icon-192.png" />
  <link rel="apple-touch-icon" href="/static/icon-192.png" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
  <link rel="stylesheet" href="/static/styles.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,600&family=Space+Grotesk:wght@400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
  <div class="app-shell">
    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-title">Corex</div>
      <button class="new-chat-btn" id="clearChatBtn">+ New Session</button>
      <div class="sidebar-section">
        <div class="sidebar-label">Mode</div>
        <div class="history-item mode-item active" id="modeGeneralBtn" data-mode="general">
          <i class="fas fa-globe"></i> General
        </div>
        <div class="history-item mode-item" id="modeDocumentBtn" data-mode="document">
          <i class="fas fa-file-lines"></i> My Document
        </div>
      </div>
    </aside>

    <!-- MAIN CHAT -->
    <main class="main-area">
      <header class="top-bar">
        <div class="top-bar-left">
          <button class="sidebar-toggle" id="sidebarToggle" title="Toggle sidebar">
            <i class="fas fa-bars"></i>
          </button>
          <div class="session-title" id="sessionTitle">General Chat</div>
        </div>
        <div class="top-bar-right">
          <div class="dropdown-container">
            <button class="icon-btn" id="optionsBtn" title="More options">
              <i class="fas fa-ellipsis-h"></i>
            </button>
            <div class="dropdown-menu" id="optionsMenu">
              <button class="dropdown-item" id="downloadTxt">
                <i class="fas fa-file-text"></i>
                Download as TXT
              </button>
              <button class="dropdown-item" id="downloadPdf">
                <i class="fas fa-file-pdf"></i>
                Download as PDF
              </button>
            </div>
          </div>
        </div>
      </header>

      <!-- Document Upload Panel (shown in "My Document" mode) -->
      <div class="document-panel" id="documentPanel" hidden>
        <div class="document-upload" id="documentUpload">
          <i class="fas fa-cloud-arrow-up"></i>
          <p>Upload a PDF, TXT, or image (PNG/JPG) file, then ask questions about it.</p>
          <label class="upload-btn" for="documentFileInput">
            Choose File
            <input type="file" id="documentFileInput" accept=".pdf,.txt,.png,.jpg,.jpeg" hidden />
          </label>
          <span class="upload-status" id="uploadStatus"></span>
        </div>
        <div class="active-document" id="activeDocument" hidden>
          <i class="fas fa-file-circle-check"></i>
          <span id="activeDocumentName"></span>
          <button class="remove-doc-btn" id="removeDocumentBtn" title="Remove document">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
      </div>

      <div class="chat-scroll" id="chatMessages">
        <div class="welcome-message">
          <h2>Welcome to Corex</h2>
          <p>Ask me anything and I'll help you with accurate, document-backed answers.</p>
        </div>
      </div>

      <footer class="input-zone">
        <div class="attached-image-preview" id="attachedImagePreview" hidden>
          <i class="fas fa-image"></i>
          <span id="attachedImageName"></span>
          <button class="remove-doc-btn" id="removeAttachedImageBtn" title="Remove image">
            <i class="fas fa-xmark"></i>
          </button>
        </div>
        <div class="input-wrapper">
          <label class="icon-btn" for="imageAttachInput" title="Attach an image to scan (OCR)">
            <i class="fas fa-paperclip"></i>
            <input type="file" id="imageAttachInput" accept=".png,.jpg,.jpeg" hidden />
          </label>
          <input
            type="text"
            id="queryInput"
            placeholder="Compose your message..."
            autocomplete="off"
          />
          <button id="micButton" class="icon-btn" title="Speak your question">
            <i class="fas fa-microphone"></i>
          </button>
          <button id="askButton" class="send-btn" title="Send message">
            Send <i class="fas fa-arrow-right"></i>
          </button>
        </div>
      </footer>
    </main>
  </div>

  <script src="/static/script.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/static/service-worker.js');
      });
    }
  </script>
</body>
</html>
